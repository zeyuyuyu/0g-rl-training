# =============================================================================
# GRPO Training Configuration for Qwen3.5-35B-A3B
# =============================================================================
#
# 注意: veRL 主要通过 CLI dot-notation 传参 (Hydra/OmegaConf)，不直接加载 YAML。
# 此文件仅作为参数参考文档和 shell 脚本的默认值来源。
#
# 实际训练入口:
#   python3 -m verl.trainer.main_ppo algorithm.adv_estimator=grpo ...
#
# 参考:
#   veRL 官方示例: examples/grpo_trainer/run_qwen2_5_7b_grpo_npu.sh
#   Qwen3.5-SWE:  https://huggingface.co/rachpradhan/Qwen3.5-35B-A3B-Turbo-SWE-v0.0.1
# =============================================================================

# --- Algorithm ---
algorithm:
  adv_estimator: grpo                # GRPO (non PPO/GAE)
  use_kl_in_reward: false            # GRPO: KL → loss, not reward
  norm_adv_by_std_in_grpo: true      # group-internal std normalization

# --- Data ---
data:
  train_files: ./data/train.parquet
  val_files: ./data/val.parquet
  train_batch_size: 128              # prompts per global batch
  max_prompt_length: 8192
  max_response_length: 32768         # long CoT response
  filter_overlong_prompts: true
  truncation: error

# --- Actor + Rollout + Ref (co-located) ---
actor_rollout_ref:
  model:
    path: Qwen/Qwen3.5-35B-A3B      # or SFT checkpoint path
    enable_gradient_checkpointing: true
    use_remove_padding: false

  actor:
    optim:
      lr: 5e-6                       # MoE: 用比 dense 更小的 LR
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 2
    use_kl_loss: true                 # GRPO: KL 加到 loss
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl          # k3 estimator, 低方差
    entropy_coeff: 0
    loss_agg_mode: token-mean         # 长 CoT 更稳定
    fsdp_config:
      param_offload: false
      optimizer_offload: false

  rollout:
    name: vllm                        # vllm or sglang
    n: 8                              # Group size G=8 (同 Qwen3.5-SWE)
    tensor_model_parallel_size: 4     # TP 并行度
    gpu_memory_utilization: 0.4       # vLLM memory fraction
    log_prob_micro_batch_size_per_gpu: 2
    enable_chunked_prefill: false

  ref:
    log_prob_micro_batch_size_per_gpu: 2
    fsdp_config:
      param_offload: true             # ref policy offload 节省显存

# --- Custom Reward Function ---
reward:
  custom_reward_function:
    path: ./src/reward_functions.py   # 自定义 reward
    name: compute_score               # veRL 会调用此函数

# --- Trainer ---
trainer:
  critic_warmup: 0                    # GRPO: 无 critic
  logger: console                     # console / wandb / tensorboard
  project_name: 0g-rl-training
  experiment_name: qwen35-grpo
  n_gpus_per_node: 4
  nnodes: 1
  save_freq: 100
  test_freq: 50
  total_epochs: 5
